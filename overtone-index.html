const {

  useMemo

/* ── API helper ── */
function getAPI() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  return hash.replace(/\/$/, '') + '/functions/v1/overtone-api';
}
async function api(path, opts = {}) {
  const base = getAPI();
  if (!base) return null;
  try {
    const r = await fetch(base + (path || ''), {
      headers: {
        'Content-Type': 'application/json'
      },
      ...opts
    });
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    return null;
  }
}

/* ── Music ── */
const NT = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const OCTS = [3, 4, 5];
const ALL = OCTS.flatMap(o => NT.map(n => ({
  n,
  full: n + o,
  oct: o,
  bk: n.includes('#')
})));
const WK = ALL.filter(k => !k.bk);
const BK = ALL.filter(k => k.bk);
const WW = 100 / WK.length;
const KB = {
  a: 'C3',
  w: 'C#3',
  s: 'D3',
  e: 'D#3',
  d: 'E3',
  f: 'F3',
  t: 'F#3',
  g: 'G3',
  y: 'G#3',
  h: 'A3',
  u: 'A#3',
  j: 'B3',
  k: 'C4',
  o: 'C#4',
  l: 'D4',
  p: 'D#4',
  z: 'F4',
  x: 'G4',
  c: 'A4',
  v: 'B4',
  b: 'C5',
  n: 'D5',
  m: 'E5'
};
const mid = note => {
  const m = note.match(/^([A-G]#?)(\d+)$/);
  return m ? (parseInt(m[2]) + 1) * 12 + NT.indexOf(m[1]) : 0;
};
const bkL = k => {
  const mp = {
    'C#': 'C',
    'D#': 'D',
    'F#': 'F',
    'G#': 'G',
    'A#': 'A'
  };
  const i = WK.findIndex(w => w.n === mp[k.n] && w.oct === k.oct);
  return i < 0 ? -100 : (i + .62) * WW;
};
const fmtT = ms => {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
};
const kbl = f => {
  const e = Object.entries(KB).find(function (p) {
    return p[1] === f;
  });
  return e ? e[0].toUpperCase() : '';
};
const dynL = v => v < .25 ? 'pp' : v < .4 ? 'p' : v < .55 ? 'mp' : v < .7 ? 'mf' : v < .85 ? 'f' : 'ff';
function calcStats(ev) {
  if (!ev.length) return null;
  const last = ev[ev.length - 1],
    dur = last.start + last.duration;
  const ms = ev.map(function (e) {
      return mid(e.note);
    }),
    mn = Math.min.apply(null, ms),
    mx = Math.max.apply(null, ms);
  const lo = ev.find(function (e) {
      return mid(e.note) === mn;
    }),
    hi = ev.find(function (e) {
      return mid(e.note) === mx;
    });
  const cnt = {};
  ev.forEach(function (e) {
    cnt[e.note] = (cnt[e.note] || 0) + 1;
  });
  const fav = Object.entries(cnt).sort(function (a, b) {
    return b[1] - a[1];
  })[0];
  const av = ev.reduce(function (s, e) {
    return s + e.velocity;
  }, 0) / ev.length;
  return {
    n: ev.length,
    dur: dur,
    lo: lo ? lo.note : '?',
    hi: hi ? hi.note : '?',
    fav: fav[0],
    fn: fav[1],
    dyn: dynL(av),
    tempo: Math.round(ev.length / (dur / 60000)),
    uniq: Object.keys(cnt).length
  };
}

/* ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ */
function App() {
  const [view, setView] = useState(function () {
    return getAPI() ? 'home' : 'setup';
  });
  const [mode, setMode] = useState('idle');
  const [act, setAct] = useState(new Set());
  const [rec, setRec] = useState([]);
  const [toneReady, setToneReady] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [title, setTitle] = useState('');
  const [msg, setMsg] = useState('');
  const [hist, setHist] = useState([]);
  const [pb, setPb] = useState(false);
  const [expH, setExpH] = useState(null);
  const [setupUrl, setSetupUrl] = useState('');
  const [setupErr, setSetupErr] = useState('');
  const [connecting, setConnecting] = useState(false);
  const synRef = useRef(null);
  const noteStartRef = useRef({});
  const recRef = useRef([]);
  const modeRef = useRef('idle');
  const recStartRef = useRef(0);
  const pbTimers = useRef([]);
  const debounceRef = useRef({});
  const wfHeights = useRef({});

  /* ── Setup ── */
  var doSetup = async function () {
    if (!setupUrl.trim()) return;
    var url = setupUrl.trim().replace(/\/$/, '');
    if (!url.startsWith('https://')) url = 'https://' + url;
    setConnecting(true);
    setSetupErr('');
    try {
      var r = await fetch(url + '/functions/v1/overtone-api/performances', {
        headers: {
          'Content-Type': 'application/json'
        }
      });
      if (r.ok) {
        window.location.hash = url;
        setView('home');
      } else {
        setSetupErr('Could not connect. Check your URL and make sure the Edge Function is deployed.');
      }
    } catch (e) {
      setSetupErr('Connection failed. Check your Supabase URL.');
    }
    setConnecting(false);
  };

  /* ── Audio ── */
  var initTone = useCallback(async function () {
    if (toneReady) return;
    if (synRef.current) return;
    await Tone.start();
    synRef.current = new Tone.PolySynth(Tone.Synth, {
      maxPolyphony: 16,
      options: {
        oscillator: {
          type: 'triangle8'
        },
        envelope: {
          attack: .005,
          decay: .3,
          sustain: .4,
          release: 1.2
        },
        volume: -8
      }
    }).toDestination();
    var rv = new Tone.Reverb({
      decay: 2.5,
      wet: .3
    }).toDestination();
    synRef.current.connect(rv);
    setToneReady(true);
  }, [toneReady]);
  var noteOn = useCallback(function (note, velocity) {
    if (!synRef.current) return;
    var now = Date.now();
    if (debounceRef.current[note] && now - debounceRef.current[note] < 100) return;
    debounceRef.current[note] = now;
    synRef.current.triggerAttack(note, Tone.now(), velocity);
    setAct(function (p) {
      var s = new Set(p);
      s.add(note);
      return s;
    });
    noteStartRef.current[note] = {
      time: Date.now(),
      velocity: velocity
    };
  }, []);
  var noteOff = useCallback(function (note) {
    if (!synRef.current) return;
    try {
      synRef.current.triggerRelease(note, Tone.now());
    } catch (e) {}
    setAct(function (p) {
      var s = new Set(p);
      s.delete(note);
      return s;
    });
    var info = noteStartRef.current[note];
    if (info && modeRef.current === 'recording') {
      var ev = {
        note: note,
        start: info.time - recStartRef.current,
        duration: Math.max(Date.now() - info.time, 50),
        velocity: +info.velocity.toFixed(2)
      };
      recRef.current = recRef.current.concat([ev]);
      setRec(recRef.current.slice());
    }
    delete noteStartRef.current[note];
  }, []);
  useEffect(function () {
    var up = function () {
      Object.keys(noteStartRef.current).forEach(function (n) {
        noteOff(n);
      });
    };
    window.addEventListener('mouseup', up);
    window.addEventListener('touchend', up);
    return function () {
      window.removeEventListener('mouseup', up);
      window.removeEventListener('touchend', up);
    };
  }, [noteOff]);
  useEffect(function () {
    var held = {};
    var dn = function (e) {
      if (e.repeat || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      var note = KB[e.key.toLowerCase()] || KB[e.key];
      if (note && !held[note]) {
        held[note] = true;
        initTone().then(function () {
          noteOn(note, .5 + Math.random() * .3);
        });
      }
    };
    var up = function (e) {
      var note = KB[e.key.toLowerCase()] || KB[e.key];
      if (note) {
        delete held[note];
        noteOff(note);
      }
    };
    window.addEventListener('keydown', dn);
    window.addEventListener('keyup', up);
    return function () {
      window.removeEventListener('keydown', dn);
      window.removeEventListener('keyup', up);
    };
  }, [initTone, noteOn, noteOff]);
  var startRec = async function () {
    await initTone();
    recRef.current = [];
    setRec([]);
    recStartRef.current = Date.now();
    modeRef.current = 'recording';
    setMode('recording');
    setSaved(false);
  };
  var stopRec = function () {
    Object.keys(noteStartRef.current).forEach(function (n) {
      noteOff(n);
    });
    modeRef.current = 'review';
    setMode('review');
  };
  var discard = function () {
    recRef.current = [];
    setRec([]);
    modeRef.current = 'idle';
    setMode('idle');
    setTitle('');
    setMsg('');
  };
  var doPlay = useCallback(function (notes) {
    if (!synRef.current || !notes.length) return;
    setPb(true);
    pbTimers.current.forEach(clearTimeout);
    pbTimers.current = [];
    notes.forEach(function (ev) {
      pbTimers.current.push(setTimeout(function () {
        synRef.current.triggerAttack(ev.note, Tone.now(), ev.velocity);
        setAct(function (p) {
          var s = new Set(p);
          s.add(ev.note);
          return s;
        });
      }, ev.start));
      pbTimers.current.push(setTimeout(function () {
        try {
          synRef.current.triggerRelease(ev.note, Tone.now());
        } catch (e) {}
        setAct(function (p) {
          var s = new Set(p);
          s.delete(ev.note);
          return s;
        });
      }, ev.start + ev.duration));
    });
    var last = notes[notes.length - 1];
    pbTimers.current.push(setTimeout(function () {
      setPb(false);
      setAct(new Set());
    }, last.start + last.duration + 300));
  }, []);
  var stopPb = function () {
    pbTimers.current.forEach(clearTimeout);
    pbTimers.current = [];
    setPb(false);
    if (synRef.current) synRef.current.releaseAll();
    setAct(new Set());
  };
  var save = async function () {
    if (!rec.length) return;
    setSaving(true);
    var last = rec[rec.length - 1];
    var res = await api('/performances', {
      method: 'POST',
      body: JSON.stringify({
        title: title || 'Untitled',
        message: msg || null,
        notes: rec,
        duration_ms: Math.round(last.start + last.duration),
        note_count: rec.length,
        performer: 'user'
      })
    });
    if (res) {
      setSaved(true);
      setTimeout(function () {
        discard();
        setSaved(false);
      }, 1800);
    } else alert('Save failed.');
    setSaving(false);
  };
  var loadH = async function () {
